<script>
  const STORAGE_KEY = 'docapp_session_v1';
  let currentSession = null;
  let currentFolders = [];
  let currentFolderKey = null;
  let pendingRegisterEmail = '';
  let pendingResetEmail = '';

  function saveSessionLocal(email, sessionToken) { localStorage.setItem(STORAGE_KEY, JSON.stringify({ email, sessionToken })); }
  function readSessionLocal() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
  function clearSessionLocal() { localStorage.removeItem(STORAGE_KEY); }

  function showScreen(id) {
    ['screen-boot', 'screen-auth', 'screen-main'].forEach(s => {
      const el = document.getElementById(s);
      if (el) el.style.display = (s === id) ? '' : 'none';
    });
  }

  document.addEventListener('DOMContentLoaded', initApp);

  function initApp() {
    bindAuthTabEvents();
    bindPasswordToggleEvents();
    bindLoginForm();
    bindRegisterForms();
    bindForgotForms();
    bindLogoutButton();
    bindFolderNavigationButtons();
    boot();
  }

  function boot() {
    const saved = readSessionLocal();
    if (!saved || !saved.email || !saved.sessionToken) { showScreen('screen-auth'); return; }
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.valid) { currentSession = saved; enterMainApp(); } 
        else { clearSessionLocal(); showScreen('screen-auth'); }
      })
      .withFailureHandler(function () { clearSessionLocal(); showScreen('screen-auth'); })
      .api_checkSession(saved.email, saved.sessionToken);
  }

  function bindAuthTabEvents() {
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        this.classList.add('active');
        const tabName = this.dataset.tab;
        if (tabName === 'login') document.getElementById('form-login').classList.add('active');
        if (tabName === 'register') document.getElementById('form-register-step1').classList.add('active');
        if (tabName === 'forgot') document.getElementById('form-forgot-step1').classList.add('active');
      });
    });
  }

  function bindPasswordToggleEvents() {
    document.querySelectorAll('.field-toggle-eye').forEach(btn => {
      btn.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        if (input.type === 'password') { input.type = 'text'; this.textContent = 'Ẩn / Hide'; } 
        else { input.type = 'password'; this.textContent = 'Hiện / Show'; }
      });
    });
  }

  function showMessage(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text; el.className = 'form-message show ' + (type || '');
  }
  function clearMessage(elId) { document.getElementById(elId).className = 'form-message'; }
  function setButtonLoading(btn, loading, loadingText, normalText) {
    btn.disabled = loading; btn.innerHTML = loading ? loadingText : normalText;
  }

  function bindLoginForm() {
    document.getElementById('form-login').addEventListener('submit', function (e) {
      e.preventDefault(); clearMessage('login-message');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('login-remember').checked;
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang đăng nhập... / Logging in...', 'Đăng nhập / Login');
      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Đăng nhập / Login');
          if (res.success) {
            currentSession = { email: res.email, sessionToken: res.sessionToken };
            if (remember) saveSessionLocal(res.email, res.sessionToken);
            enterMainApp();
          } else { showMessage('login-message', res.message, 'error'); }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Đăng nhập / Login');
          showMessage('login-message', 'Lỗi / Error: ' + err.message, 'error');
        })
        .api_login(email, password, remember);
    });
  }

  function bindRegisterForms() {
    document.getElementById('form-register-step1').addEventListener('submit', function (e) {
      e.preventDefault(); clearMessage('register-step1-message');
      const email = document.getElementById('register-email').value.trim();
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang gửi... / Sending...', 'Gửi mã xác nhận / Send OTP');
      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Gửi mã xác nhận / Send OTP');
          if (res.success) {
            pendingRegisterEmail = email;
            document.getElementById('register-email-display').textContent = email;
            document.getElementById('form-register-step1').style.display = 'none';
            document.getElementById('form-register-step2').style.display = 'flex';
          } else { showMessage('register-step1-message', res.message, 'error'); }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Gửi mã xác nhận / Send OTP');
          showMessage('register-step1-message', 'Lỗi / Error: ' + err.message, 'error');
        })
        .api_requestRegister(email);
    });

    document.getElementById('register-back-link').addEventListener('click', function () {
      document.getElementById('form-register-step2').style.display = 'none';
      document.getElementById('form-register-step1').style.display = 'flex';
      clearMessage('register-step2-message');
    });

    document.getElementById('form-register-step2').addEventListener('submit', function (e) {
      e.preventDefault(); clearMessage('register-step2-message');
      const otp = document.getElementById('register-otp').value.trim();
      const pwd1 = document.getElementById('register-password').value;
      const pwd2 = document.getElementById('register-password2').value;
      const btn = this.querySelector('button[type="submit"]');

      if (pwd1 !== pwd2) { showMessage('register-step2-message', 'Mật khẩu không khớp. / Passwords do not match.', 'error'); return; }

      setButtonLoading(btn, true, 'Đang xử lý... / Processing...', 'Hoàn tất đăng ký / Complete');
      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Hoàn tất đăng ký / Complete');
          if (res.success) {
            showMessage('register-step2-message', res.message, 'success');
            setTimeout(function () {
              document.getElementById('form-register-step2').style.display = 'none';
              document.getElementById('form-register-step1').style.display = 'flex';
              document.getElementById('register-email').value = '';
              document.getElementById('register-otp').value = '';
              document.getElementById('register-password').value = '';
              document.getElementById('register-password2').value = '';
              clearMessage('register-step2-message');
              document.querySelector('.auth-tab[data-tab="login"]').click();
              document.getElementById('login-email').value = pendingRegisterEmail;
            }, 1600);
          } else { showMessage('register-step2-message', res.message, 'error'); }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Hoàn tất đăng ký / Complete');
          showMessage('register-step2-message', 'Lỗi / Error: ' + err.message, 'error');
        })
        .api_completeRegister(pendingRegisterEmail, otp, pwd1);
    });
  }

  function bindForgotForms() {
    document.getElementById('form-forgot-step1').addEventListener('submit', function (e) {
      e.preventDefault(); clearMessage('forgot-step1-message');
      const email = document.getElementById('forgot-email').value.trim();
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang gửi... / Sending...', 'Gửi mã đặt lại / Send Code');
      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Gửi mã đặt lại / Send Code');
          if (res.success) {
            pendingResetEmail = email;
            document.getElementById('forgot-email-display').textContent = email;
            document.getElementById('form-forgot-step1').style.display = 'none';
            document.getElementById('form-forgot-step2').style.display = 'flex';
          } else { showMessage('forgot-step1-message', res.message, 'error'); }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Gửi mã đặt lại / Send Code');
          showMessage('forgot-step1-message', 'Lỗi / Error: ' + err.message, 'error');
        })
        .api_requestPasswordReset(email);
    });

    document.getElementById('forgot-back-link').addEventListener('click', function () {
      document.getElementById('form-forgot-step2').style.display = 'none';
      document.getElementById('form-forgot-step1').style.display = 'flex';
      clearMessage('forgot-step2-message');
    });

    document.getElementById('form-forgot-step2').addEventListener('submit', function (e) {
      e.preventDefault(); clearMessage('forgot-step2-message');
      const otp = document.getElementById('forgot-otp').value.trim();
      const pwd1 = document.getElementById('forgot-password').value;
      const pwd2 = document.getElementById('forgot-password2').value;
      const btn = this.querySelector('button[type="submit"]');

      if (pwd1 !== pwd2) { showMessage('forgot-step2-message', 'Mật khẩu không khớp. / Passwords do not match.', 'error'); return; }

      setButtonLoading(btn, true, 'Đang xử lý... / Processing...', 'Đặt lại mật khẩu / Reset');
      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Đặt lại mật khẩu / Reset');
          if (res.success) {
            showMessage('forgot-step2-message', res.message, 'success');
            setTimeout(function () {
              document.getElementById('form-forgot-step2').style.display = 'none';
              document.getElementById('form-forgot-step1').style.display = 'flex';
              document.getElementById('forgot-email').value = '';
              document.getElementById('forgot-otp').value = '';
              document.getElementById('forgot-password').value = '';
              document.getElementById('forgot-password2').value = '';
              clearMessage('forgot-step2-message');
              document.querySelector('.auth-tab[data-tab="login"]').click();
              document.getElementById('login-email').value = pendingResetEmail;
            }, 1600);
          } else { showMessage('forgot-step2-message', res.message, 'error'); }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Đặt lại mật khẩu / Reset');
          showMessage('forgot-step2-message', 'Lỗi / Error: ' + err.message, 'error');
        })
        .api_completePasswordReset(pendingResetEmail, otp, pwd1);
    });
  }

  function bindLogoutButton() {
    document.getElementById('btn-logout').addEventListener('click', function () {
      if (!currentSession) return;
      google.script.run
        .withSuccessHandler(function () {
          clearSessionLocal(); currentSession = null; currentFolders = []; currentFolderKey = null;
          document.getElementById('form-login').reset();
          document.querySelectorAll('.form-message').forEach(el => el.className = 'form-message');
          document.querySelector('.auth-tab[data-tab="login"]').click();
          showScreen('screen-auth');
        })
        .api_logout(currentSession.email, currentSession.sessionToken);
    });
  }

  function enterMainApp() {
    document.getElementById('topbar-email').textContent = currentSession.email;
    showScreen('screen-main');
    loadFolders();
  }

  function loadFolders() {
    const listEl = document.getElementById('folder-list');
    listEl.innerHTML = '<div class="sidebar-empty">Đang tải / Loading...</div>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) { listEl.innerHTML = '<div class="sidebar-empty">' + escapeHtml(res.message) + '</div>'; return; }
        currentFolders = res.folders;
        renderFolderList();
      })
      .withFailureHandler(function (err) { listEl.innerHTML = '<div class="sidebar-empty">Lỗi / Error: ' + escapeHtml(err.message) + '</div>'; })
      .api_getAccessibleFolders(currentSession.email, currentSession.sessionToken);
  }

  function renderFolderList() {
    const listEl = document.getElementById('folder-list');
    if (!currentFolders.length) {
      listEl.innerHTML = '<div class="sidebar-empty">Chưa có quyền xem tài liệu.<br><i>No permission to view files.</i></div>';
      return;
    }
    listEl.innerHTML = '';

    const folderMap = {};
    const roots = [];

    currentFolders.forEach(function(f) {
      folderMap[f.key] = Object.assign({}, f, { children: [] });
    });

    currentFolders.forEach(function(f) {
      if (f.parentKey && folderMap[f.parentKey]) {
        folderMap[f.parentKey].children.push(folderMap[f.key]);
      } else {
        roots.push(folderMap[f.key]);
      }
    });

    function renderNodes(nodes, container, level) {
      nodes.forEach(function(node) {
        const hasChildren = node.children.length > 0;
        const wrapper = document.createElement('div');
        
        const btn = document.createElement('button');
        btn.className = 'sidebar-item' + (node.key === currentFolderKey ? ' active' : '');
        btn.style.paddingLeft = (10 + level * 20) + 'px'; 
        
        const toggleSpan = document.createElement('span');
        toggleSpan.innerHTML = hasChildren ? '▼' : '';
        toggleSpan.style.width = '20px';
        toggleSpan.style.display = 'inline-block';
        toggleSpan.style.textAlign = 'center';
        
        if (hasChildren) {
          toggleSpan.style.cursor = 'pointer';
          toggleSpan.onclick = function(e) {
            e.stopPropagation(); 
            const childDiv = document.getElementById('child-' + node.key);
            if (childDiv) {
              const isHidden = childDiv.style.display === 'none';
              childDiv.style.display = isHidden ? 'block' : 'none';
              toggleSpan.innerHTML = isHidden ? '▼' : '▶'; 
            }
          };
        }

        const labelSpan = document.createElement('span');
        labelSpan.innerHTML = '<span class="sidebar-icon" style="margin-right:8px">📁</span><span>' + escapeHtml(node.name) + '</span>';
        
        btn.appendChild(toggleSpan);
        btn.appendChild(labelSpan);
        btn.onclick = function() { openFolder(node.key); };
        
        wrapper.appendChild(btn);

        if (hasChildren) {
          const childContainer = document.createElement('div');
          childContainer.id = 'child-' + node.key;
          renderNodes(node.children, childContainer, level + 1);
          wrapper.appendChild(childContainer);
        }
        
        container.appendChild(wrapper);
      });
    }
    renderNodes(roots, listEl, 0);
  }

  function bindFolderNavigationButtons() {
    document.getElementById('btn-back-to-list').addEventListener('click', function () {
      currentFolderKey = null;
      renderFolderList();
      document.getElementById('file-list-view').style.display = 'none';
      document.getElementById('content-empty-state').style.display = '';
    });
    document.getElementById('btn-back-to-files').addEventListener('click', function () {
      document.getElementById('file-viewer-iframe').src = '';
      document.getElementById('file-viewer-view').style.display = 'none';
      document.getElementById('file-list-view').style.display = '';
    });
  }

  function openFolder(folderKey, subFolderId) {
    currentFolderKey = folderKey;
    renderFolderList();

    document.getElementById('content-empty-state').style.display = 'none';
    document.getElementById('file-viewer-view').style.display = 'none';
    document.getElementById('file-list-view').style.display = '';
    document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">Đang tải / Loading...</div>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) {
          document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">' + escapeHtml(res.message) + '</div>';
          return;
        }
        document.getElementById('current-folder-name').textContent = res.folderName;
        renderFileGrid(res.files);
      })
      .withFailureHandler(function (err) {
        document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">Lỗi / Error: ' + escapeHtml(err.message) + '</div>';
      })
      .api_getFilesInFolder(currentSession.email, currentSession.sessionToken, folderKey, subFolderId);
  }

  function renderFileGrid(files) {
    const grid = document.getElementById('file-grid');
    if (!files.length) {
      grid.innerHTML = '<div class="sidebar-empty">Danh mục này chưa có tài liệu nào.<br><i>This folder is empty.</i></div>';
      return;
    }
    grid.innerHTML = '';
    files.forEach(function (file) {
      const card = document.createElement('div');
      card.className = 'file-card';
      const metaText = file.mimeType === 'application/vnd.google-apps.folder' ? 'Thư mục / Folder' : formatBytes(file.sizeBytes);
      card.innerHTML =
        '<div class="file-card-icon">' + iconForMime(file.mimeType) + '</div>' +
        '<div class="file-card-name">' + escapeHtml(file.name) + '</div>' +
        '<div class="file-card-meta">' + metaText + '</div>';
      
      if (file.mimeType === 'application/vnd.google-apps.folder') {
        card.addEventListener('click', function () { openFolder(currentFolderKey, file.id); });
      } else {
        card.addEventListener('click', function () { openFileViewer(file); });
      }
      grid.appendChild(card);
    });
  }

  function openFileViewer(file) {
    document.getElementById('current-file-name').textContent = file.name;
    document.getElementById('file-viewer-iframe').src = file.previewUrl;
    document.getElementById('btn-open-new-tab').href = file.openUrl;
    document.getElementById('file-list-view').style.display = 'none';
    document.getElementById('file-viewer-view').style.display = '';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatBytes(bytes) {
    if (!bytes) return '';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0; let val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return val.toFixed(val < 10 && i > 0 ? 1 : 0) + ' ' + units[i];
  }

  function iconForMime(mime) {
    if (!mime) return '📄';
    if (mime.indexOf('folder') !== -1) return '📁';
    if (mime.indexOf('spreadsheet') !== -1) return '📊';
    if (mime.indexOf('presentation') !== -1) return '📽️';
    if (mime.indexOf('document') !== -1 || mime.indexOf('word') !== -1) return '📝';
    if (mime.indexOf('pdf') !== -1) return '📕';
    if (mime.indexOf('image') !== -1) return '🖼️';
    return '📄';
  }
</script>
