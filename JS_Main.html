<script>
  /****************************************************************
   * STATE & STORAGE
   ****************************************************************/
  const STORAGE_KEY = 'docapp_session_v1';
  let currentSession = null; // { email, sessionToken }
  let currentFolders = [];
  let currentFolderKey = null;
  let pendingRegisterEmail = '';
  let pendingResetEmail = '';

  function saveSessionLocal(email, sessionToken) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ email, sessionToken }));
  }
  function readSessionLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function clearSessionLocal() {
    localStorage.removeItem(STORAGE_KEY);
  }

  /****************************************************************
   * SCREEN SWITCHING
   ****************************************************************/
  function showScreen(id) {
    ['screen-boot', 'screen-auth', 'screen-main'].forEach(s => {
      const el = document.getElementById(s);
      if (el) el.style.display = (s === id) ? '' : 'none';
    });
  }

  /****************************************************************
   * MỌI THAO TÁC TRUY CẬP DOM CHỈ CHẠY SAU KHI DOM ĐÃ SẴN SÀNG
   * (tránh lỗi "Cannot read properties of null" khi script
   * thực thi trước khi các phần tử HTML phía trên được parse xong)
   ****************************************************************/
  document.addEventListener('DOMContentLoaded', initApp);

  function initApp() {
    bindAuthTabEvents();
    bindPasswordToggleEvents();
    bindLoginForm();
    bindRegisterForms();
    bindForgotForms();
    bindLogoutButton();
    bindFolderNavigationButtons();
    boot();
  }

  /****************************************************************
   * BOOT - kiểm tra session lưu sẵn khi load trang
   ****************************************************************/
  function boot() {
    const saved = readSessionLocal();
    if (!saved || !saved.email || !saved.sessionToken) {
      showScreen('screen-auth');
      return;
    }
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.valid) {
          currentSession = saved;
          enterMainApp();
        } else {
          clearSessionLocal();
          showScreen('screen-auth');
        }
      })
      .withFailureHandler(function () {
        clearSessionLocal();
        showScreen('screen-auth');
      })
      .api_checkSession(saved.email, saved.sessionToken);
  }

  /****************************************************************
   * AUTH TABS
   ****************************************************************/
  function bindAuthTabEvents() {
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        this.classList.add('active');

        const tabName = this.dataset.tab;
        if (tabName === 'login') document.getElementById('form-login').classList.add('active');
        if (tabName === 'register') document.getElementById('form-register-step1').classList.add('active');
        if (tabName === 'forgot') document.getElementById('form-forgot-step1').classList.add('active');
      });
    });
  }

  function bindPasswordToggleEvents() {
    document.querySelectorAll('.field-toggle-eye').forEach(btn => {
      btn.addEventListener('click', function () {
        const input = document.getElementById(this.dataset.target);
        if (input.type === 'password') {
          input.type = 'text'; this.textContent = 'Ẩn';
        } else {
          input.type = 'password'; this.textContent = 'Hiện';
        }
      });
    });
  }

  function showMessage(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'form-message show ' + (type || '');
  }
  function clearMessage(elId) {
    const el = document.getElementById(elId);
    el.className = 'form-message';
  }
  function setButtonLoading(btn, loading, loadingText, normalText) {
    btn.disabled = loading;
    btn.textContent = loading ? loadingText : normalText;
  }

  /****************************************************************
   * ĐĂNG NHẬP
   ****************************************************************/
  function bindLoginForm() {
    document.getElementById('form-login').addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessage('login-message');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('login-remember').checked;
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang đăng nhập...', 'Đăng nhập');

      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Đăng nhập');
          if (res.success) {
            currentSession = { email: res.email, sessionToken: res.sessionToken };
            if (remember) {
              saveSessionLocal(res.email, res.sessionToken);
            }
            enterMainApp();
          } else {
            showMessage('login-message', res.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Đăng nhập');
          showMessage('login-message', 'Có lỗi xảy ra: ' + err.message, 'error');
        })
        .api_login(email, password, remember);
    });
  }

  /****************************************************************
   * ĐĂNG KÝ - BƯỚC 1 & 2
   ****************************************************************/
  function bindRegisterForms() {
    document.getElementById('form-register-step1').addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessage('register-step1-message');
      const email = document.getElementById('register-email').value.trim();
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang gửi...', 'Gửi mã xác nhận');

      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Gửi mã xác nhận');
          if (res.success) {
            pendingRegisterEmail = email;
            document.getElementById('register-email-display').textContent = email;
            document.getElementById('form-register-step1').style.display = 'none';
            document.getElementById('form-register-step2').style.display = 'flex';
          } else {
            showMessage('register-step1-message', res.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Gửi mã xác nhận');
          showMessage('register-step1-message', 'Có lỗi xảy ra: ' + err.message, 'error');
        })
        .api_requestRegister(email);
    });

    document.getElementById('register-back-link').addEventListener('click', function () {
      document.getElementById('form-register-step2').style.display = 'none';
      document.getElementById('form-register-step1').style.display = 'flex';
      clearMessage('register-step2-message');
    });

    document.getElementById('form-register-step2').addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessage('register-step2-message');
      const otp = document.getElementById('register-otp').value.trim();
      const pwd1 = document.getElementById('register-password').value;
      const pwd2 = document.getElementById('register-password2').value;
      const btn = this.querySelector('button[type="submit"]');

      if (pwd1 !== pwd2) {
        showMessage('register-step2-message', 'Hai mật khẩu nhập không khớp.', 'error');
        return;
      }

      setButtonLoading(btn, true, 'Đang xử lý...', 'Hoàn tất đăng ký');

      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Hoàn tất đăng ký');
          if (res.success) {
            showMessage('register-step2-message', res.message, 'success');
            setTimeout(function () {
              document.getElementById('form-register-step2').style.display = 'none';
              document.getElementById('form-register-step1').style.display = 'flex';
              document.getElementById('register-email').value = '';
              document.getElementById('register-otp').value = '';
              document.getElementById('register-password').value = '';
              document.getElementById('register-password2').value = '';
              clearMessage('register-step2-message');
              document.querySelector('.auth-tab[data-tab="login"]').click();
              document.getElementById('login-email').value = pendingRegisterEmail;
            }, 1600);
          } else {
            showMessage('register-step2-message', res.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Hoàn tất đăng ký');
          showMessage('register-step2-message', 'Có lỗi xảy ra: ' + err.message, 'error');
        })
        .api_completeRegister(pendingRegisterEmail, otp, pwd1);
    });
  }

  /****************************************************************
   * QUÊN MẬT KHẨU - BƯỚC 1 & 2
   ****************************************************************/
  function bindForgotForms() {
    document.getElementById('form-forgot-step1').addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessage('forgot-step1-message');
      const email = document.getElementById('forgot-email').value.trim();
      const btn = this.querySelector('button[type="submit"]');

      setButtonLoading(btn, true, 'Đang gửi...', 'Gửi mã đặt lại');

      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Gửi mã đặt lại');
          if (res.success) {
            pendingResetEmail = email;
            document.getElementById('forgot-email-display').textContent = email;
            document.getElementById('form-forgot-step1').style.display = 'none';
            document.getElementById('form-forgot-step2').style.display = 'flex';
          } else {
            showMessage('forgot-step1-message', res.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Gửi mã đặt lại');
          showMessage('forgot-step1-message', 'Có lỗi xảy ra: ' + err.message, 'error');
        })
        .api_requestPasswordReset(email);
    });

    document.getElementById('forgot-back-link').addEventListener('click', function () {
      document.getElementById('form-forgot-step2').style.display = 'none';
      document.getElementById('form-forgot-step1').style.display = 'flex';
      clearMessage('forgot-step2-message');
    });

    document.getElementById('form-forgot-step2').addEventListener('submit', function (e) {
      e.preventDefault();
      clearMessage('forgot-step2-message');
      const otp = document.getElementById('forgot-otp').value.trim();
      const pwd1 = document.getElementById('forgot-password').value;
      const pwd2 = document.getElementById('forgot-password2').value;
      const btn = this.querySelector('button[type="submit"]');

      if (pwd1 !== pwd2) {
        showMessage('forgot-step2-message', 'Hai mật khẩu nhập không khớp.', 'error');
        return;
      }

      setButtonLoading(btn, true, 'Đang xử lý...', 'Đặt lại mật khẩu');

      google.script.run
        .withSuccessHandler(function (res) {
          setButtonLoading(btn, false, '', 'Đặt lại mật khẩu');
          if (res.success) {
            showMessage('forgot-step2-message', res.message, 'success');
            setTimeout(function () {
              document.getElementById('form-forgot-step2').style.display = 'none';
              document.getElementById('form-forgot-step1').style.display = 'flex';
              document.getElementById('forgot-email').value = '';
              document.getElementById('forgot-otp').value = '';
              document.getElementById('forgot-password').value = '';
              document.getElementById('forgot-password2').value = '';
              clearMessage('forgot-step2-message');
              document.querySelector('.auth-tab[data-tab="login"]').click();
              document.getElementById('login-email').value = pendingResetEmail;
            }, 1600);
          } else {
            showMessage('forgot-step2-message', res.message, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setButtonLoading(btn, false, '', 'Đặt lại mật khẩu');
          showMessage('forgot-step2-message', 'Có lỗi xảy ra: ' + err.message, 'error');
        })
        .api_completePasswordReset(pendingResetEmail, otp, pwd1);
    });
  }

  /****************************************************************
   * ĐĂNG XUẤT
   ****************************************************************/
  function bindLogoutButton() {
    document.getElementById('btn-logout').addEventListener('click', function () {
      if (!currentSession) return;
      google.script.run
        .withSuccessHandler(function () {
          clearSessionLocal();
          currentSession = null;
          currentFolders = [];
          currentFolderKey = null;
          document.getElementById('form-login').reset();
          document.querySelectorAll('.form-message').forEach(el => el.className = 'form-message');
          document.querySelector('.auth-tab[data-tab="login"]').click();
          showScreen('screen-auth');
        })
        .api_logout(currentSession.email, currentSession.sessionToken);
    });
  }

  /****************************************************************
   * VÀO MÀN HÌNH CHÍNH - LOAD DANH MỤC FOLDER
   ****************************************************************/
  function enterMainApp() {
    document.getElementById('topbar-email').textContent = currentSession.email;
    showScreen('screen-main');
    loadFolders();
  }

  function loadFolders() {
    const listEl = document.getElementById('folder-list');
    listEl.innerHTML = '<div class="sidebar-empty">Đang tải danh mục...</div>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) {
          listEl.innerHTML = '<div class="sidebar-empty">' + escapeHtml(res.message) + '</div>';
          return;
        }
        currentFolders = res.folders;
        renderFolderList();
      })
      .withFailureHandler(function (err) {
        listEl.innerHTML = '<div class="sidebar-empty">Lỗi tải danh mục: ' + escapeHtml(err.message) + '</div>';
      })
      .api_getAccessibleFolders(currentSession.email, currentSession.sessionToken);
  }

  function renderFolderList() {
    const listEl = document.getElementById('folder-list');
    if (!currentFolders.length) {
      listEl.innerHTML = '<div class="sidebar-empty">Bạn chưa được cấp quyền xem danh mục tài liệu nào. Vui lòng liên hệ quản trị hệ thống.</div>';
      return;
    }
    listEl.innerHTML = '';
    currentFolders.forEach(function (folder) {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item' + (folder.key === currentFolderKey ? ' active' : '');
      btn.innerHTML = '<span class="sidebar-icon">📁</span><span>' + escapeHtml(folder.name) + '</span>';
      btn.addEventListener('click', function () { openFolder(folder.key); });
      listEl.appendChild(btn);
    });
  }

  /****************************************************************
   * MỞ FOLDER - HIỂN THỊ DANH SÁCH FILE
   ****************************************************************/
  function bindFolderNavigationButtons() {
    document.getElementById('btn-back-to-list').addEventListener('click', function () {
      currentFolderKey = null;
      renderFolderList();
      document.getElementById('file-list-view').style.display = 'none';
      document.getElementById('content-empty-state').style.display = '';
    });

    document.getElementById('btn-back-to-files').addEventListener('click', function () {
      document.getElementById('file-viewer-iframe').src = '';
      document.getElementById('file-viewer-view').style.display = 'none';
      document.getElementById('file-list-view').style.display = '';
    });
  }

  function openFolder(folderKey) {
    currentFolderKey = folderKey;
    renderFolderList();

    document.getElementById('content-empty-state').style.display = 'none';
    document.getElementById('file-viewer-view').style.display = 'none';
    document.getElementById('file-list-view').style.display = '';
    document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">Đang tải tài liệu...</div>';

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) {
          document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">' + escapeHtml(res.message) + '</div>';
          return;
        }
        document.getElementById('current-folder-name').textContent = res.folderName;
        renderFileGrid(res.files);
      })
      .withFailureHandler(function (err) {
        document.getElementById('file-grid').innerHTML = '<div class="sidebar-empty">Lỗi: ' + escapeHtml(err.message) + '</div>';
      })
      .api_getFilesInFolder(currentSession.email, currentSession.sessionToken, folderKey);
  }

  function renderFileGrid(files) {
    const grid = document.getElementById('file-grid');
    if (!files.length) {
      grid.innerHTML = '<div class="sidebar-empty">Danh mục này chưa có tài liệu nào.</div>';
      return;
    }
    grid.innerHTML = '';
    files.forEach(function (file) {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML =
        '<div class="file-card-icon">' + iconForMime(file.mimeType) + '</div>' +
        '<div class="file-card-name">' + escapeHtml(file.name) + '</div>' +
        '<div class="file-card-meta">' + formatBytes(file.sizeBytes) + '</div>';
      card.addEventListener('click', function () { openFileViewer(file); });
      grid.appendChild(card);
    });
  }

  /****************************************************************
   * XEM FILE TRỰC TIẾP (EMBED DRIVE VIEWER)
   ****************************************************************/
  function openFileViewer(file) {
    document.getElementById('current-file-name').textContent = file.name;
    document.getElementById('file-viewer-iframe').src = file.previewUrl;
    document.getElementById('btn-open-new-tab').href = file.openUrl;

    document.getElementById('file-list-view').style.display = 'none';
    document.getElementById('file-viewer-view').style.display = '';
  }

  /****************************************************************
   * HELPERS HIỂN THỊ
   ****************************************************************/
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatBytes(bytes) {
    if (!bytes) return '';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0; let val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return val.toFixed(val < 10 && i > 0 ? 1 : 0) + ' ' + units[i];
  }

  function iconForMime(mime) {
    if (!mime) return '📄';
    if (mime.indexOf('folder') !== -1) return '📁';
    if (mime.indexOf('spreadsheet') !== -1) return '📊';
    if (mime.indexOf('presentation') !== -1) return '📽️';
    if (mime.indexOf('document') !== -1 || mime.indexOf('word') !== -1) return '📝';
    if (mime.indexOf('pdf') !== -1) return '📕';
    if (mime.indexOf('image') !== -1) return '🖼️';
    return '📄';
  }
</script>
